#App config values
spring.application.name=ProductService
productservice.type = FakeStoreProductService
server.port = ${SERVER_PORT}
app.base.url = /products

#FakeStore config values
fakestore.api.url = https://fakestoreapi.com
fakestore.api.paths.products = /products

#DB config
spring.jpa.hibernate.ddl-auto = update
spring.datasource.url = ${DATABASE_URL}
spring.datasource.username = ${DATABASE_USERNAME}
#spring.datasource.password = ThePassword
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.jpa.show-sql = true

# Flyway should be enabled (add these lines)
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true

spring.security.oauth2.resourceserver.jwt.issuer-uri = ${AUTH_SERVER_ISSUER_URI}

# to bypass JWT validation for local dev, set this to "local", it should come from env variables
spring.profiles.active=local

spring.elasticsearch.uris=http://localhost:9200

spring.data.redis.host=localhost
spring.data.redis.port=6379

# AWS Cloudwatch
logging.file.name=logs/product-service.log

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka